<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JKUAT Community Hub - JKUAT Estate Watch</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vapi-ai/web@3/dist/vapi.js"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#0d1e36] text-gray-200 flex flex-col min-h-screen font-sans antialiased w-full overflow-x-hidden">

    <header class="bg-[#0d1e36]/95 backdrop-blur-md border-b border-[#e5a93b]/20 sticky top-0 z-50 w-full">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between gap-2">
            <div class="flex items-center gap-2 shrink-0">
               <img src="https://i.postimg.cc/KjqJXsmm/JKUAT-HUB-Logo.jpg" alt="Community Hub Logo" class="w-24 h-24 object-contain rounded-full border-2 border-[#e5a93b]/30 p-1 bg-[#0d1e36]">
               <div>
                    <span class="text-xs font-black tracking-wider text-white uppercase block">HOMETOUCH</span>
                    <span class="text-[8px] tracking-widest text-[#e5a93b] font-bold block uppercase -mt-1">Community Hub Services</span>
               </div>
            </div>
            <nav class="flex items-center gap-1 text-[11px] font-bold text-gray-400 overflow-x-auto no-scrollbar py-1">
                <button onclick="switchTab('home', this)" class="tab-btn px-2.5 py-1.5 text-white bg-[#e5a93b]/15 rounded-md border-b-2 border-[#e5a93b] whitespace-nowrap shrink-0">Home</button>
                <button onclick="switchTab('storage', this)" class="tab-btn px-2.5 py-1.5 hover:text-white transition whitespace-nowrap shrink-0">Storage</button>
                <button onclick="switchTab('laundry', this)" class="tab-btn px-2.5 py-1.5 hover:text-white transition whitespace-nowrap shrink-0">Laundry</button>
                <button onclick="switchTab('courier', this)" class="tab-btn px-2.5 py-1.5 hover:text-white transition whitespace-nowrap shrink-0">Courier</button>
                <button onclick="switchTab('accommodation', this)" class="tab-btn px-2.5 py-1.5 hover:text-white transition whitespace-nowrap shrink-0">Accommodation</button>
                <button onclick="switchTab('marketplace', this)" class="tab-btn px-2.5 py-1.5 hover:text-white transition whitespace-nowrap shrink-0">Marketplace</button>
            </nav>
        </div>
    </header>

    <main class="w-full max-w-6xl mx-auto px-4 py-6 flex-grow box-border">
        <div id="home-tab" class="tab-content active">
            </div>

        <div id="storage-tab" class="tab-content">
            </div>

        <div id="laundry-tab" class="tab-content">
            </div>

        <div id="courier-tab" class="tab-content">
            <section class="bg-[#11233d] border border-[#e5a93b]/10 rounded-xl p-8 max-w-lg mx-auto text-center shadow-xl">
                <h3 class="text-sm font-bold text-white uppercase tracking-wider mb-4">Courier & Delivery</h3>
                <p class="text-[12px] text-gray-400 mb-6">Need a package moved? We handle secure student deliveries within JKUAT and Juja. From documents to groceries, we get it done.</p>
                <button onclick="window.location.href='https://wa.me/254795104088'" class="w-full bg-[#e5a93b] text-[#0d1e36] font-black py-3 rounded text-xs uppercase tracking-wider transition hover:bg-[#cca325]">
                    Book a Courier (WhatsApp)
                </button>
            </section>
        </div>

        <div id="accommodation-tab" class="tab-content">
             </div>

        <div id="marketplace-tab" class="tab-content">
             </div>
    </main>

    <script>
        // --- VAPI INITIALIZATION ---
        const vapi = new Vapi('YOUR_PUBLIC_KEY_HERE'); 

        function toggleVapiCall() {
            if (vapi.isCallActive) {
                vapi.stop();
            } else {
                vapi.start();
            }
        }

        vapi.on('call-start', () => {
            document.getElementById('vapi-icon-idle').classList.add('hidden');
            document.getElementById('vapi-icon-active').classList.remove('hidden');
        });

        vapi.on('call-end', () => {
            document.getElementById('vapi-icon-idle').classList.remove('hidden');
            document.getElementById('vapi-icon-active').classList.add('hidden');
        });

        // --- TAB SWITCHING LOGIC ---
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.className = 'tab-btn px-2.5 py-1.5 hover:text-white transition whitespace-nowrap shrink-0');
            document.getElementById(tabId + '-tab').classList.add('active');
            btn.className = 'tab-btn px-2.5 py-1.5 text-white bg-[#e5a93b]/15 rounded-md border-b-2 border-[#e5a93b] whitespace-nowrap shrink-0';
        }

        // --- EXISTING FUNCTIONS (Hostel/Price Calcs) ---
        // (Paste your original fetchHostelCounts, updateQty, calculateTotals functions here)
    </script>
</body>
</html>
